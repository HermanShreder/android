<script>
const username = "tgworkcv";

function isInAppBrowser() {
  const ua = navigator.userAgent || "";
  return /FBAN|FBAV|Instagram|Line|Twitter|TikTok|Snapchat|WhatsApp/i.test(ua);
}

function openTelegram() {
  const deepLink = `tg://resolve?domain=${username}`;
  const webLink = `https://t.me/${username}`;

  let hidden = false;

  // отслеживаем уход со страницы (значит открылось приложение)
  document.addEventListener("visibilitychange", () => {
    if (document.hidden) {
      hidden = true;
    }
  });

  // 1. пробуем deep link
  window.location.href = deepLink;

  // 2. fallback ТОЛЬКО если не ушёл в приложение
  setTimeout(() => {
    if (!hidden) {
      window.location.href = webLink;
    }
  }, 1500);
}

window.onload = function () {
  const hint = document.getElementById("hint");

  if (isInAppBrowser()) {
    hint.innerHTML =
      "Нажмите ⋮ и выберите «Открыть в браузере»";
  } else {
    setTimeout(openTelegram, 500);
  }
};
</script>
