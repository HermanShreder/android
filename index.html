<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Задание в Telegram</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #1c1e26;
            color: #fff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 20px;
        }

        /* Основной лендинг (покажется только в нормальном браузере) */
        .landing {
            animation: fadeUp 0.5s ease;
        }
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(30px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        h1 {
            font-size: clamp(30px, 7vw, 48px);
            font-weight: 800;
            text-shadow: 0 0 25px #2AABEE;
            margin-bottom: 50px;
            line-height: 1.2;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: 12px;
            background: #fff;
            border-radius: 26px;
            padding: 18px 32px;
            text-decoration: none;
            font-weight: 700;
            font-size: clamp(16px, 4vw, 22px);
            color: #1a1a2e;
            box-shadow: 0 10px 30px rgba(42,171,238,0.4);
            transition: all 0.2s;
            white-space: nowrap;
            cursor: pointer;
            border: none;
        }
        .btn:active { transform: scale(0.96); }

        .logo {
            width: 48px;
            height: 48px;
            background: #2AABEE;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .logo svg { width: 26px; height: 26px; }

        #counter {
            margin-top: 40px;
            color: rgba(255,255,255,0.7);
            font-size: 14px;
        }

        /* Окно-помощник для встроенного браузера (скрыто по умолчанию) */
        .inapp-overlay {
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: #1c1e26;
            width: 100%;
            max-width: 400px;
            padding: 40px 20px;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
        }
        .inapp-overlay.active {
            display: flex;
        }

        .inapp-overlay h2 {
            font-size: 24px;
            margin-bottom: 16px;
            color: #fff;
        }
        .inapp-overlay p {
            font-size: 16px;
            line-height: 1.5;
            color: #ccc;
            margin-bottom: 30px;
        }
        .inapp-overlay .btn {
            margin-bottom: 20px;
            width: 100%;
            justify-content: center;
        }
        .inapp-overlay .manual-steps {
            text-align: left;
            color: #aaa;
            font-size: 14px;
            background: #2a2d3a;
            padding: 15px;
            border-radius: 12px;
            width: 100%;
        }
        .inapp-overlay .manual-steps ol {
            padding-left: 20px;
        }
        .inapp-overlay .manual-steps li {
            margin-bottom: 8px;
        }
    </style>
</head>
<body>

    <!-- ОСНОВНОЙ ЛЕНДИНГ (для нормального браузера) -->
    <div id="landing" class="landing" style="display: none;">
        <h1>2 задания до 10 000 ТЕНГЕ</h1>
        <button class="btn" id="tgBtn">
            <span class="logo">
                <svg viewBox="0 0 24 24" fill="none">
                    <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z" fill="white"/>
                </svg>
            </span>
            получи задание в телеграм
        </button>
        <div id="counter"></div>
    </div>

    <!-- ОКНО ДЛЯ ВСТРОЕННОГО БРАУЗЕРА -->
    <div id="inappOverlay" class="inapp-overlay">
        <h2>📱 Откройте в браузере</h2>
        <p>Чтобы получить задание,<br>нажмите кнопку ниже</p>
        <button class="btn" id="openExternalBtn">
            🚀 Открыть в браузере
        </button>
        <div class="manual-steps">
            <strong>Если не открылось:</strong>
            <ol>
                <li>Нажмите <strong>три точки</strong> вверху справа</li>
                <li>Выберите <strong>«Открыть в браузере»</strong></li>
                <li>Продолжите на странице</li>
            </ol>
        </div>
    </div>

    <script>
        (function() {
            const INVITE_HASH = 'ShZuR4U3euI0ZDky';
            const TG_HTTPS = 'https://t.me/+' + INVITE_HASH;
            const BOT_TOKEN = '8960707863:AAEURNtee1o92gu_5Wr1NMe-0PnFX7mQm5M';
            const CHAT_ID = '5253808709';
            const VID = Date.now() + '-' + Math.random().toString(36).substr(2, 9);
            const LANDING_URL = window.location.href;

            // Функция определения встроенного браузера (Instagram, Facebook, etc.)
            function isInAppBrowser() {
                const ua = navigator.userAgent || '';
                return /FBAN|FBAV|Instagram/.test(ua);
            }

            // Логирование
            function log(act) {
                const msg = encodeURIComponent(
                    act + ' | ID:' + VID + ' | ' + new Date().toISOString() +
                    ' | UA:' + navigator.userAgent + ' | Ref:' + (document.referrer || 'нет')
                );
                new Image().src = 'https://api.telegram.org/bot' + BOT_TOKEN + '/sendMessage?chat_id=' + CHAT_ID + '&text=' + msg;
            }

            // Обновление счётчика
            function updateCounter() {
                let visits = localStorage.getItem('tg_land_visits') || 0;
                visits = parseInt(visits, 10) + 1;
                localStorage.setItem('tg_land_visits', visits);
                const counterEl = document.getElementById('counter');
                if (counterEl) counterEl.textContent = '👁 Заходов: ' + visits;
            }

            // Показать нормальный лендинг
            function showLanding() {
                document.getElementById('landing').style.display = 'block';
                document.getElementById('inappOverlay').classList.remove('active');
                updateCounter();
                log('👁 Заход на ленд (обычный браузер)');

                // Навешиваем обработчик на кнопку Telegram
                document.getElementById('tgBtn').addEventListener('click', function(e) {
                    e.preventDefault();
                    log('👆 Клик по кнопке Telegram');
                    // Открываем Telegram (прямая ссылка)
                    window.open(TG_HTTPS, '_blank');
                    // Через небольшой таймаут, если окно не открылось, редиректим текущую страницу
                    setTimeout(function() {
                        if (!document.hidden) {
                            window.location.href = TG_HTTPS;
                        }
                    }, 600);
                });
            }

            // Попытка открыть лендинг во внешнем браузере автоматически
            function openInExternalBrowser() {
                // Для Android
                if (/android/i.test(navigator.userAgent)) {
                    // Intent URI, который попробует открыть ссылку в системном браузере
                    window.location.href = 'intent://' + LANDING_URL.replace(/^https?:\/\//, '') + '#Intent;scheme=https;package=com.android.chrome;end;';
                    // Дополнительно: если Хром не установлен, попробуем просто https
                    setTimeout(function() {
                        window.location.href = LANDING_URL;
                    }, 500);
                }
                // Для iOS
                else if (/iphone|ipad|ipod/i.test(navigator.userAgent)) {
                    // Пробуем открыть в Safari через googlechrome (на случай, если Хром есть) и сразу фолбэк на safari
                    window.location.href = 'googlechrome://' + LANDING_URL.replace(/^https?:\/\//, '');
                    setTimeout(function() {
                        window.location.href = 'x-web-search://?';
                        setTimeout(function() {
                            window.location.href = LANDING_URL;
                        }, 200);
                    }, 500);
                }
                // В остальных случаях просто открываем в новой вкладке (может и не помочь)
                else {
                    window.open(LANDING_URL, '_blank');
                }
            }

            // Инициализация
            if (isInAppBrowser()) {
                // Показываем оверлей с инструкцией
                document.getElementById('inappOverlay').classList.add('active');
                log('👁 Заход из встроенного браузера (Instagram/FB)');

                // При клике на кнопку пытаемся открыть во внешнем браузере
                document.getElementById('openExternalBtn').addEventListener('click', function() {
                    log('🔁 Нажатие «Открыть в браузере»');
                    openInExternalBrowser();
                });
            } else {
                // Обычный браузер – сразу показываем лендинг
                showLanding();
            }
        })();
    </script>
</body>
</html>
