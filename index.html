<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Задание в Telegram</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            min-height: 100vh;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1c1e26, #2a2d3a);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            text-align: center;
            color: #fff;
        }
        .wrap { max-width: 400px; width: 100%; }
        h1 {
            font-size: clamp(32px, 8vw, 52px);
            font-weight: 800;
            text-shadow: 0 0 30px #2AABEE;
            margin-bottom: 60px;
            line-height: 1.2;
        }
        a.btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 14px;
            background: #fff;
            border-radius: 26px;
            padding: 20px 30px;
            text-decoration: none;
            font-weight: 700;
            font-size: clamp(18px, 5vw, 24px);
            color: #1a1a2e;
            box-shadow: 0 10px 30px rgba(42,171,238,0.4);
            transition: transform 0.2s, box-shadow 0.2s;
            white-space: nowrap;
        }
        a.btn:active {
            transform: scale(0.96);
            box-shadow: 0 6px 20px rgba(42,171,238,0.7);
        }
        .logo {
            width: 50px;
            height: 50px;
            background: #2AABEE;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .logo svg {
            width: 28px;
            height: 28px;
        }
    </style>
</head>
<body>
    <div class="wrap">
        <h1>2 задания до 10 000 ТЕНГЕ</h1>

        <!-- Ссылка с готовым сообщением -->
        <a class="btn" href="https://t.me/workquary?text=%D0%9C%D0%BD%D0%B5%20%D0%B8%D0%BD%D1%82%D0%B5%D1%80%D0%B5%D1%81%D0%BD%D0%BE%2C%20%D0%BF%D1%80%D0%B8%D1%88%D0%BB%D0%B8%D1%82%D0%B5%20%D0%B7%D0%B0%D0%B4%D0%B0%D0%BD%D0%B8%D1%8F">
            <span class="logo">
                <svg viewBox="0 0 24 24" fill="none">
                    <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z" fill="white"/>
                </svg>
            </span>
            получи задание в телеграм
        </a>
    </div>
</body>
</html>
