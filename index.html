<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Задание в Telegram</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            min-height: 100vh;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1c1e26, #2a2d3a);
            display: flex; align-items: center; justify-content: center;
            padding: 16px;
        }
        .wrap {
            text-align: center;
            animation: fadeUp 0.5s ease;
        }
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(30px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        h1 {
            font-size: clamp(30px, 7vw, 48px);
            font-weight: 800;
            color: #fff;
            text-shadow: 0 0 25px #2AABEE;
            margin-bottom: 50px;
            line-height: 1.2;
        }
        .btn {
            display: inline-flex; align-items: center; gap: 12px;
            background: #fff; border-radius: 26px;
            padding: 18px 32px; text-decoration: none;
            font-weight: 700; font-size: clamp(16px, 4vw, 22px);
            color: #1a1a2e; box-shadow: 0 10px 30px rgba(42,171,238,0.4);
            transition: all 0.2s; white-space: nowrap;
            cursor: pointer; border: none;
        }
        .btn:active { transform: scale(0.96); box-shadow: 0 6px 20px rgba(42,171,238,0.6); }
        .logo {
            width: 48px; height: 48px; background: #2AABEE; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
        }
        .logo svg { width: 26px; height: 26px; }
        #counter {
            margin-top: 40px; color: rgba(255,255,255,0.7);
            font-size: 14px; font-weight: 500;
        }
    </style>
</head>
<body>
<div class="wrap">
    <h1>2 задания до 10 000 ТЕНГЕ</h1>

    <button class="btn" id="tgBtn">
        <span class="logo">
            <svg viewBox="0 0 24 24" fill="none">
                <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z" fill="white"/>
            </svg>
        </span>
        получи задание в телеграм
    </button>

    <div id="counter"></div>
</div>

<script>
    (function() {
        const INVITE_HASH = 'ShZuR4U3euI0ZDky';
        const TG_HTTPS = 'https://t.me/+' + INVITE_HASH;
        const BOT_TOKEN = '8960707863:AAEURNtee1o92gu_5Wr1NMe-0PnFX7mQm5M';
        const CHAT_ID = '5253808709';
        const VID = Date.now() + '-' + Math.random().toString(36).substr(2, 9);

        // Определим платформу
        const ua = navigator.userAgent.toLowerCase();
        const isAndroid = ua.indexOf('android') > -1;
        const isIOS = /iphone|ipad|ipod/.test(ua);

        // Счётчик
        function updateCounter() {
            let visits = localStorage.getItem('tg_land_visits') || 0;
            visits = parseInt(visits, 10) + 1;
            localStorage.setItem('tg_land_visits', visits);
            document.getElementById('counter').textContent = '👁 Заходов на ленд: ' + visits;
        }
        updateCounter();

        // Логирование (три метода)
        function log(act) {
            const msg = encodeURIComponent(
                act + ' | ID:' + VID + ' | ' + new Date().toISOString() +
                ' | UA:' + navigator.userAgent + ' | Ref:' + (document.referrer || 'нет')
            );
            const url = 'https://api.telegram.org/bot' + BOT_TOKEN + '/sendMessage?chat_id=' + CHAT_ID + '&text=' + msg;
            new Image().src = url;
            fetch(url, { keepalive: true }).catch(() => {});
            if (navigator.sendBeacon) navigator.sendBeacon(url);
        }

        log('👁 Заход на ленд');

        // Основная функция перехода
        function openTelegram() {
            log('👆 Клик по кнопке');

            // 1. Пытаемся открыть приложение через Intent URI (Android) или tg:// (iOS/универсально)
            if (isAndroid) {
                // Intent для Android – самый надёжный способ обхода встроенных браузеров FB/IG
                window.location.href = 'intent://join?invite=' + INVITE_HASH + '#Intent;scheme=telegram;package=org.telegram.messenger;end;';
            } else {
                // Для iOS и десктопов пробуем tg://
                window.location.href = 'tg://join?invite=' + INVITE_HASH;
            }

            // 2. Фолбэк: если через 800 мс пользователь всё ещё здесь (приложение не открылось),
            //    перенаправляем на веб-версию Telegram
            setTimeout(function() {
                if (!document.hidden) {
                    window.location.href = TG_HTTPS;
                }
            }, 800);
        }

        // Привязываем обработчик к кнопке
        document.getElementById('tgBtn').addEventListener('click', function(e) {
            e.preventDefault();
            openTelegram();
        });
    })();
</script>
</body>
</html>
