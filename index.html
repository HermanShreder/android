<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Оффер</title>

<style>
  body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #e6f3ff, #ffffff);
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .card {
    text-align: center;
    background: #fff;
    padding: 40px 25px;
    border-radius: 20px;
    box-shadow: 0 15px 40px rgba(0,0,0,0.12);
    width: 90%;
    max-width: 360px;
  }

  .title {
    font-size: 28px;
    font-weight: 800;
    margin-bottom: 10px;
  }

  .subtitle {
    font-size: 18px;
    margin-bottom: 25px;
    color: #333;
  }

  .price {
    font-size: 34px;
    font-weight: 900;
    color: #229ED9;
    margin-bottom: 30px;
  }

  .btn {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    background: #229ED9;
    color: #fff;
    border: none;
    padding: 16px 22px;
    font-size: 18px;
    font-weight: bold;
    border-radius: 50px;
    cursor: pointer;
    width: 100%;
    box-shadow: 0 8px 20px rgba(34,158,217,0.4);
    transition: 0.2s;
  }

  .btn:active {
    transform: scale(0.97);
  }

  .icon {
    width: 30px;
    height: 30px;
    background: #fff;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .icon svg {
    width: 16px;
    height: 16px;
    fill: #229ED9;
  }
</style>

<script>
function openTG() {
  const tgLink = "tg://resolve?domain=tgworkcv";
  const webLink = "https://t.me/tgworkcv";

  // пытаемся открыть приложение Telegram
  window.location.href = tgLink;

  // fallback если не открылось
  setTimeout(function() {
    window.location.href = webLink;
  }, 800);
}
</script>

</head>

<body>

<div class="card">
  <div class="title">Заработок в Telegram</div>
  <div class="subtitle">Простая регистрация и доступ к системе</div>
  <div class="price">5000 ₸ за регистрацию</div>

  <button class="btn" onclick="openTG()">
    <div class="icon">
      <svg viewBox="0 0 24 24">
        <path d="M9.036 15.804l-.376 5.292c.538 0 .772-.23 1.054-.506l2.528-2.422 5.236 3.828c.96.53 1.64.25 1.9-.89l3.444-16.152c.32-1.48-.54-2.06-1.47-1.72L1.56 9.42c-1.43.56-1.41 1.36-.24 1.72l5.36 1.674L19.6 6.3c.6-.38 1.14-.17.69.23"/>
      </svg>
    </div>
    Перейти в Telegram
  </button>
</div>

</body>
</html>
