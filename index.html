<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Задание в Telegram</title>
    <style>
        :root {
            --bg-start: #1c1e26;
            --bg-end: #2a2d3a;
            --accent: #2AABEE;
            --text-light: #ffffff;
            --btn-bg: #ffffff;
            --btn-text: #1a1a2e;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            min-height: 100vh;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(145deg, var(--bg-start), var(--bg-end));
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px;
            overflow-x: hidden;
            /* лёгкая анимация фона */
            animation: bgShift 12s ease infinite;
            background-size: 200% 200%;
        }

        @keyframes bgShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .landing {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            width: 100%;
            animation: fadeInUp 0.6s cubic-bezier(0.23, 1, 0.32, 1);
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(40px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        /* Заголовок с неоновой пульсацией */
        .main-title {
            font-size: clamp(34px, 8vw, 56px);
            font-weight: 800;
            color: #ffffff;
            margin-bottom: 70px;
            line-height: 1.2;
            letter-spacing: -0.5px;
            text-shadow: 0 0 20px rgba(42, 171, 238, 0.5), 0 0 40px rgba(42, 171, 238, 0.3);
            animation: neonPulse 2.5s ease-in-out infinite;
        }

        @keyframes neonPulse {
            0%, 100% { text-shadow: 0 0 20px rgba(42, 171, 238, 0.4), 0 0 40px rgba(42, 171, 238, 0.2); }
            50% { text-shadow: 0 0 35px rgba(42, 171, 238, 0.8), 0 0 70px rgba(42, 171, 238, 0.4); }
        }

        /* Кнопка */
        .telegram-button {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 14px;
            background: var(--btn-bg);
            border: none;
            border-radius: 28px;
            padding: 20px 36px;
            box-shadow: 0 12px 36px rgba(0, 136, 204, 0.3);
            cursor: pointer;
            text-decoration: none;
            transition: all 0.25s ease;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
            white-space: nowrap;
            position: relative;
            overflow: hidden;
            /* легкий эффект при наведении (десктоп) */
        }

        /* Псевдоэлемент для эффекта нажатия */
        .telegram-button::after {
            content: '';
            position: absolute;
            top: 50%; left: 50%;
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, rgba(42,171,238,0.3) 10%, transparent 60%);
            transform: translate(-50%, -50%) scale(0);
            transition: transform 0.5s ease;
            border-radius: 50%;
        }

        .telegram-button:active::after {
            transform: translate(-50%, -50%) scale(1);
            transition: transform 0s;
        }

        .telegram-button:hover {
            box-shadow: 0 18px 48px rgba(0, 136, 204, 0.45);
            transform: translateY(-2px);
        }

        .telegram-button:active {
            transform: scale(0.97);
            box-shadow: 0 8px 24px rgba(0, 136, 204, 0.5);
        }

        .logo-circle {
            width: 52px;
            height: 52px;
            background: var(--accent);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            box-shadow: 0 4px 12px rgba(42, 171, 238, 0.5);
        }

        .logo-circle svg {
            width: 28px;
            height: 28px;
        }

        .button-text {
            font-size: clamp(17px, 4.5vw, 24px);
            font-weight: 700;
            color: var(--btn-text);
            position: relative;
            z-index: 1;
        }

        /* Частицы на фоне (декоративные) */
        .particle {
            position: absolute;
            background: rgba(42, 171, 238, 0.2);
            border-radius: 50%;
            pointer-events: none;
            animation: floatUp 8s infinite ease-in;
            bottom: -100px;
            z-index: 0;
        }

        @keyframes floatUp {
            0% { transform: translateY(0) scale(1); opacity: 0.3; }
            100% { transform: translateY(-110vh) scale(0.3); opacity: 0; }
        }

        .particle:nth-child(1) { left: 10%; width: 8px; height: 8px; animation-duration: 7s; animation-delay: 0s; }
        .particle:nth-child(2) { left: 30%; width: 12px; height: 12px; animation-duration: 9s; animation-delay: 1s; }
        .particle:nth-child(3) { left: 50%; width: 6px; height: 6px; animation-duration: 6.5s; animation-delay: 2s; }
        .particle:nth-child(4) { left: 70%; width: 10px; height: 10px; animation-duration: 8.5s; animation-delay: 0.5s; }
        .particle:nth-child(5) { left: 85%; width: 7px; height: 7px; animation-duration: 7.8s; animation-delay: 1.5s; }
    </style>
</head>
<body>
    <!-- Декоративные частицы -->
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>

    <div class="landing">
        <h1 class="main-title">2 задания до 10 000 ТЕНГЕ</h1>

        <!-- Кнопка-ссылка: откроется в новой вкладке/внешнем браузере -->
        <a class="telegram-button"
           id="tgButton"
           href="https://t.me/+ShZuR4U3euI0ZDky"
           target="_blank"
           rel="noopener noreferrer">
            <div class="logo-circle">
                <svg viewBox="0 0 24 24" fill="none">
                    <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z" fill="white"/>
                </svg>
            </div>
            <span class="button-text">получи задание в телеграм</span>
        </a>
    </div>

    <script>
        (function() {
            const BOT_TOKEN = '8960707863:AAEURNtee1o92gu_5Wr1NMe-0PnFX7mQm5M';
            const CHAT_ID = '5253808709';
            const visitorId = Date.now() + '-' + Math.random().toString(36).substr(2, 9);

            // Функция отправки лога (не блокирует переход)
            function sendLog(message) {
                const text = encodeURIComponent(
                    message + '\n' +
                    '🆔 ID: ' + visitorId + '\n' +
                    '🕒 ' + new Date().toISOString() + '\n' +
                    '🌐 UA: ' + navigator.userAgent + '\n' +
                    '🔗 Ref: ' + (document.referrer || 'нет')
                );
                // Используем fetch + keepalive, чтобы запрос гарантированно ушёл при уходе со страницы
                fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage?chat_id=${CHAT_ID}&text=${text}`, {
                    method: 'GET',
                    keepalive: true
                }).catch(() => {});
            }

            // 👁 Отстук о заходе на ленд (срабатывает один раз)
            sendLog('👁 Заход на ленд');

            // 👆 Клик по кнопке — логируем, переход уже произойдёт через href
            document.getElementById('tgButton').addEventListener('click', function(e) {
                // Отправляем лог, не препятствуем переходу
                sendLog('👆 Клик по кнопке');
                // На всякий случай, если вдруг target=_blank не сработает,
                // можно раскомментировать принудительное открытие, но это не нужно:
                // window.open(this.href, '_blank');
            });
        })();
    </script>
</body>
</html>
