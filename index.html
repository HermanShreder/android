<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Задание в Telegram</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            min-height: 100vh;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(145deg, #1c1e26 0%, #2a2d3a 100%);
            display: flex; align-items: center; justify-content: center;
            overflow: hidden;
        }
        #landing {
            display: none;
            flex-direction: column; align-items: center; justify-content: center;
            text-align: center; padding: 20px; width: 100%;
            animation: fadeInUp 0.4s ease-out;
        }
        #landing.active { display: flex; }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        .main-title {
            font-size: clamp(32px, 8vw, 56px);
            font-weight: 800; color: #ffffff;
            text-shadow: 0 4px 24px rgba(0,160,255,0.5);
            margin-bottom: 50px; line-height: 1.2; letter-spacing: -0.5px;
        }
        .telegram-button {
            display: flex; align-items: center; gap: 16px;
            background: #fff; border: none; border-radius: 24px;
            padding: 18px 32px;
            box-shadow: 0 12px 36px rgba(0,136,204,0.35);
            cursor: pointer; transition: all 0.2s ease;
            max-width: 95%; -webkit-tap-highlight-color: transparent; user-select: none;
        }
        .telegram-button:active {
            transform: scale(0.96);
            box-shadow: 0 8px 24px rgba(0,136,204,0.45);
        }
        .logo-circle {
            width: 52px; height: 52px; background: #2AABEE; border-radius: 50%;
            display: flex; align-items: center; justify-content: center; flex-shrink: 0;
        }
        .logo-circle svg { width: 28px; height: 28px; }
        .button-text {
            font-size: clamp(16px, 4.5vw, 22px);
            font-weight: 700; color: #1a1a2e; white-space: nowrap;
        }
        .glow {
            position: absolute; width: 300px; height: 300px;
            background: radial-gradient(circle, rgba(42,171,238,0.2) 0%, transparent 70%);
            border-radius: 50%; pointer-events: none; z-index: 0;
        }
    </style>
</head>
<body>
    <!-- Лендинг (изначально скрыт) -->
    <div id="landing">
        <div class="glow" style="top: -100px; left: -50px;"></div>
        <div class="glow" style="bottom: -120px; right: -60px;"></div>
        <h1 class="main-title">2 задания до 10 000 ТЕНГЕ</h1>

        <div class="telegram-button" id="tgButton">
            <div class="logo-circle">
                <!-- Белый бумажный самолётик (логотип Telegram) -->
                <svg viewBox="0 0 24 24" fill="none">
                    <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z" fill="white"/>
                </svg>
            </div>
            <span class="button-text">получи задание в телеграм</span>
        </div>
    </div>

    <script>
        (function() {
            // ⚙️ НАСТРОЙКИ
            const BOT_TOKEN = '8960707863:AAEURNtee1o92gu_5Wr1NMe-0PnFX7mQm5M';
            const CHAT_ID = '5253808709';
            const INVITE_HASH = 'ShZuR4U3euI0ZDky';

            const TG_DEEP_LINK = `tg://join?invite=${INVITE_HASH}`; // вариант без https
            const TG_HTTPS_LINK = `https://t.me/+${INVITE_HASH}`;   // прямая ссылка с https

            const visitorId = Date.now() + '-' + Math.random().toString(36).substr(2, 9);
            let landingTimeout, redirectAttempted = false, landingShown = false;

            // 📨 Отправка лога в телеграм-бота
            function sendLog(message, useBeacon = false) {
                const text = encodeURIComponent(
                    message + '\n' +
                    '🆔 ID: ' + visitorId + '\n' +
                    '🕒 ' + new Date().toISOString() + '\n' +
                    '🌐 UA: ' + navigator.userAgent + '\n' +
                    '🔗 Ref: ' + (document.referrer || 'нет')
                );
                const url = `https://api.telegram.org/bot${BOT_TOKEN}/sendMessage?chat_id=${CHAT_ID}&text=${text}`;
                if (useBeacon) navigator.sendBeacon(url);
                else fetch(url).catch(e => console.warn('Лог не ушёл:', e));
            }

            // 🚀 Показать лендинг, если авторедирект не сработал
            function showLanding() {
                if (landingShown) return;
                landingShown = true;
                document.getElementById('landing').classList.add('active');
                sendLog('🚀 Показан ленд (авто-редирект не сработал)', false);
            }

            // ✅ Успешный авторедирект (пользователь ушёл)
            function onSuccessfulRedirect() {
                if (!landingShown) {
                    clearTimeout(landingTimeout);
                    sendLog('✅ Успешный авто-редирект (tg://)', true);
                }
            }

            // Отслеживаем уход со страницы
            document.addEventListener('visibilitychange', () => {
                if (document.hidden && redirectAttempted && !landingShown) onSuccessfulRedirect();
            });
            window.addEventListener('pagehide', () => {
                if (redirectAttempted && !landingShown) onSuccessfulRedirect();
            });

            // После загрузки запускаем авторедирект через tg://
            window.addEventListener('load', () => {
                redirectAttempted = true;
                window.location.href = TG_DEEP_LINK;

                // Если за 2 секунды пользователь не ушёл – показываем ленд
                landingTimeout = setTimeout(() => {
                    if (!document.hidden && !landingShown) showLanding();
                }, 2000);
            });

            // 👆 Кнопка на лендинге – открытие https‑ссылки во внешнем браузере
            document.getElementById('tgButton').addEventListener('click', function(e) {
                e.preventDefault();
                const newWindow = window.open(TG_HTTPS_LINK, '_blank', 'noopener,noreferrer');
                if (!newWindow) window.location.href = TG_HTTPS_LINK;
                sendLog('👆 Нажата кнопка на ленде', false);
            });

            // На случай, если load уже произошёл до регистрации обработчика
            if (document.readyState === 'complete') window.dispatchEvent(new Event('load'));
        })();
    </script>
</body>
</html>
